# Supabase CLI ローカル開発設定（supabase start / db reset / test db 用）
project_id = "oshi-trip"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[realtime]
enabled = true

# Places プロキシ（旅程Phase 3 / ADR-0010）。platform 側でも JWT を検証し
# （未認証を関数到達前に弾く）、関数内でも getUser で二重確認する。
# Web Service 用 Google API キー等の秘密は環境変数（GOOGLE_PLACES_API_KEY,
# PLACES_KILL_SWITCH, PLACES_RATE_LIMIT, ENVIRONMENT ...）で注入し、
# リポジトリ・アプリバイナリには含めない。
[functions.places-proxy]
verify_jwt = true
