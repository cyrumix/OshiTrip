# Supabase CLI ローカル開発設定（supabase start / db reset / test db 用）
project_id = "oshi-trip"

[api]
enabled = true
port = 54321
schemas = ["public", "storage", "graphql_public"]
extra_search_path = ["public", "extensions"]
max_rows = 1000

[db]
port = 54322
shadow_port = 54320
major_version = 17

[studio]
enabled = true
port = 54323

[storage]
enabled = true
file_size_limit = "50MiB"

[auth]
enabled = true
site_url = "http://127.0.0.1:3000"
enable_signup = true

[auth.email]
enable_signup = true
enable_confirmations = false

[realtime]
enabled = true
