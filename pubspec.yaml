name: oshi_trip
description: "OshiTrip"
publish_to: none
version: 0.1.0+1

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  # 状態管理 (ADR-0003)
  flutter_riverpod: ^2.6.1
  # ルーティング (ADR-0004)
  go_router: ^14.8.1
  # バックエンド (ADR-0002)
  supabase_flutter: ^2.8.0
  # ローカル永続化/オフライン (ADR-0005)
  drift: ^2.26.0
  # 端末DB暗号化 (H-03): SQLCipher。sqlite3_flutter_libs の代わりに使う
  # （二重リンク回避のため sqlite3_flutter_libs は外す）。
  sqlcipher_flutter_libs: ^0.6.0
  # 暗号鍵の OS Keychain/Keystore 保管 (H-03)
  flutter_secure_storage: ^9.2.2
  # SQLite Dart API（暗号化DBの open/export/verify に使用, H-03）
  sqlite3: ^2.4.0
  path_provider: ^2.1.5
  path: ^1.9.0
  # 実行中バイナリの applicationId/bundle id を取得し、コンパイル時 flavor との
  # 不一致を起動時に検知するために使用（H-01）。
  package_info_plus: ^8.1.2
  # 値オブジェクト/モデル
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0
  # 画像・ユーティリティ
  image_picker: ^1.1.2
  intl: any
  collection: ^1.18.0
  uuid: ^4.5.1
  http: ^1.2.0
  url_launcher: ^6.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  drift_dev: ^2.26.0
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  mocktail: ^1.0.4
  fake_async: ^1.3.1

flutter:
  uses-material-design: true
